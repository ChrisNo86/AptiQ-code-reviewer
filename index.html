<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CN AI Code Reviewer</title>

    <link rel="stylesheet" href="style.css" />

    <script defer src="main.js"></script>
  </head>

  <body>
    <header class="hero">
      <div class="container">
        <span class="brand-badge">
          <img src="assets/logo.png" alt="CN Logo" class="brand-logo" />
          <span class="ai-badge"> AptiQ Engine </span>
          CN Interactive Systems
        </span>

        <h1>AptiQ Code Review</h1>

        <p>Powered by the AptiQ Analysis Engine.</p>
      </div>
    </header>

    <main class="container">
      <section class="card">
        <h2>Code Input</h2>

        <textarea
          id="codeInput"
          placeholder="Paste your code here..."
        ></textarea>

        <div class="action-bar">
          <button id="analyzeBtn">Analyze</button>

          <button id="exampleBtn">Load Example</button>

          <button id="clearBtn">Clear</button>
        </div>
      </section>

      <section id="scoreCard" class="card hidden">
        <h2>AptiQ Quality Score</h2>

        <div id="scoreValue" class="score-value">0</div>
      </section>

      <section id="statsCard" class="card hidden">
        <h2>Statistics</h2>

        <div class="stats-grid">
          <div>
            Lines:
            <strong id="lineCount">0</strong>
          </div>

          <div>
            Characters:
            <strong id="charCount">0</strong>
          </div>

          <div>
            Functions:
            <strong id="functionCount">0</strong>
          </div>

          <div>
            Variables:
            <strong id="variableCount">0</strong>
          </div>

          <div>
            Comments:
            <strong id="commentCount">0</strong>
          </div>
        </div>
      </section>

      <section id="analysisCard" class="card hidden">
        <h2>AptiQ Review</h2>

        <div id="analysisOutput"></div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <p>© 2026 CN Interactive Systems</p>
      </div>
    </footer>
  </body>
</html>
